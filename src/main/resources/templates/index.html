<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Todo App</title>
	<style>
		:root {
			color-scheme: light;
			--bg: #f4efe6;
			--panel: #ffffff;
			--text: #1f2937;
			--muted: #6b7280;
			--accent: #2563eb;
			--accent-soft: #dbeafe;
			--border: #e5e7eb;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: Arial, Helvetica, sans-serif;
			background: linear-gradient(135deg, #f4efe6 0%, #e8eefc 100%);
			color: var(--text);
		}

		.container {
			max-width: 900px;
			margin: 0 auto;
			padding: 40px 20px 60px;
		}

		.hero {
			background: rgba(255, 255, 255, 0.8);
			backdrop-filter: blur(10px);
			border: 1px solid rgba(255, 255, 255, 0.7);
			border-radius: 28px;
			padding: 32px;
			box-shadow: 0 20px 60px rgba(31, 41, 55, 0.12);
		}

		h1 {
			margin: 0 0 8px;
			font-size: clamp(2rem, 4vw, 3rem);
		}

		p {
			margin: 0;
			color: var(--muted);
		}

		.card {
			margin-top: 24px;
			background: var(--panel);
			border: 1px solid var(--border);
			border-radius: 22px;
			padding: 24px;
		}

		.form {
			display: grid;
			grid-template-columns: 1fr auto;
			gap: 12px;
		}

		input, select, textarea, button {
			font: inherit;
		}

		input, textarea {
			width: 100%;
			border: 1px solid var(--border);
			border-radius: 14px;
			padding: 14px 16px;
			outline: none;
		}

		button, .button {
			border: 0;
			border-radius: 14px;
			padding: 14px 18px;
			background: var(--accent);
			color: #fff;
			text-decoration: none;
			font-weight: 700;
			cursor: pointer;
			display: inline-flex;
			align-items: center;
			justify-content: center;
		}

		input[type="checkbox"] {
			width: 18px;
			height: 18px;
			accent-color: var(--accent);
		}

		.list {
			list-style: none;
			padding: 0;
			margin: 20px 0 0;
			display: grid;
			gap: 12px;
		}

		.item {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 16px;
			padding: 16px 18px;
			border: 1px solid var(--border);
			border-radius: 16px;
			background: #fff;
		}

		.item.done {
			opacity: 0.72;
		}

		.title {
			font-weight: 700;
		}

		.meta {
			margin-top: 4px;
			font-size: 0.92rem;
			color: var(--muted);
		}

		.actions {
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
		}

		.secondary {
			background: var(--accent-soft);
			color: var(--accent);
		}

		.empty {
			padding: 24px;
			border: 1px dashed var(--border);
			border-radius: 16px;
			text-align: center;
			color: var(--muted);
		}

		@media (max-width: 640px) {
			.form {
				grid-template-columns: 1fr;
			}

			.item {
				flex-direction: column;
				align-items: stretch;
			}
		}
	</style>
</head>
<body>
	<main class="container">
		<section class="hero">
			<h1>Todo App</h1>
			<p>Capture tasks, keep track of what matters, and edit items quickly.</p>

			<div class="card">
				<form class="form" th:action="@{/}" method="post">
					<input type="text" name="title" placeholder="Add a new task" aria-label="Task title" required>
					<button type="submit">Add Task</button>
				</form>

				<div class="empty" th:if="${todos == null or #lists.isEmpty(todos)}">
					No tasks yet. Add your first todo above.
				</div>

				<ul class="list" th:if="${todos != null and !#lists.isEmpty(todos)}">
					<li class="item" th:each="todo : ${todos}" th:classappend="${todo.completed} ? 'done' : ''">
						<div>
							<form th:action="@{/todo/{id}/toggle(id=${todo.id})}" method="post" style="display:inline;">
								<input type="checkbox" th:checked="${todo.completed}" onchange="this.form.submit()">
							</form>
							<div class="title" th:text="${todo.title}">Sample task</div>
							<div class="meta" th:text="${todo.description != null ? todo.description : 'No description'}">No description</div>
							<div class="meta" th:if="${todo.dueDate != null}" th:text="'Due: ' + ${todo.dueDate}">Due date</div>
						</div>
						<div class="actions">
							<a class="button secondary" th:href="@{/edit/{id}(id=${todo.id})}">Edit</a>
							<form th:action="@{/todo/{id}/delete(id=${todo.id})}" method="post" style="display:inline;">
								<button class="secondary" type="submit">Delete</button>
							</form>
						</div>
					</li>
				</ul>
			</div>
		</section>
	</main>
</body>
</html>
